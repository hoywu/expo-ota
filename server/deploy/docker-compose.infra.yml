services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    shm_size: 256mb
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ChangeMeSecurely123!}
      POSTGRES_DB: ${POSTGRES_DB:-expo_ota}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql
    networks:
      - db_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  # redis:
  #   image: redis:8-alpine
  #   restart: unless-stopped
  #   ports:
  #     - "127.0.0.1:6379:6379"
  #   networks:
  #     - db_network
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5
  #     start_period: 5s

volumes:
  pg_data:
    name: expo_ota_pg_data
    driver: local

networks:
  db_network:
    driver: bridge
